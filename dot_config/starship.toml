command_timeout = 5000
scan_timeout = 5000
add_newline = true
#
# format = '$env_var$directory$git_metrics$git_status$git_branch$python$character'
#
# [env_var]
# variable = 'QENV'
# format = '\([$env_value](bold yellow)\) '

[directory]
format = '[$path]($style) '
style = 'bold cyan'
truncation_length = 3
truncation_symbol = '.../'
truncate_to_repo = true

[git_status]
style = 'bold bright-purple'

[git_metrics]
disabled = false

# [git_branch]
# format = 'on [$symbol$branch](bold blue) -> [($remote_name)/($remote_branch)](bold blue)'
# always_show_remote = true

[character]
format = '$symbol '
success_symbol = '[->](bold green)'
error_symbol = '[->](bold red)'

# [python]
# format = ''' \[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]
# '''

